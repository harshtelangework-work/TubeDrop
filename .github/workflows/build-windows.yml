name: Build Windows Installer

# Builds "TubeDrop Setup.exe" on a real Windows runner and uploads it as a
# downloadable build artifact. Trigger it manually from the Actions tab, or
# it runs automatically on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TubeDrop-Setup
          path: dist/TubeDrop Setup.exe
          if-no-files-found: error
